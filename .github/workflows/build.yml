name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: auto-painter-win.exe
          - os: macos-latest
            artifact: auto-painter-mac-arm64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --noconsole --icon=./assets/LOGO.ico --name=auto-painter-win main.py

      - name: Build (macOS arm64)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed --icon=./assets/LOGO.ico --name=auto-painter-mac main.py
          ditto -c -k --sequesterRsrc --keepParent dist/auto-painter-mac.app dist/auto-painter-mac-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./dist/${{ matrix.artifact }}
