name: Build and Release Windows EXE

on:
  push:
    tags:
      - 'v*'  # 只在推送以 v 开头的标签时触发，比如 v1.0.0

jobs:
  build:
    runs-on: windows-latest  # 使用 GitHub 提供的 Windows 环境来编译
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --noconsole --icon=./assets/LOGO.ico --name=auto-painter-win main.py

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: ./dist/auto-painter-win.exe  # 使用新的 exe 文件路径
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN  }}

      - name: Upload release to GitHub
        run: |
          echo "Release ${GITHUB_REF} created"